services:
  grobid:
    image: grobid/grobid:0.8.2.1-crf
    container_name: chemqa-grobid
    restart: unless-stopped
    ports:
      - "127.0.0.1:8070:8070"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8070/api/isalive"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
