services:
  mineru-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BASE_IMAGE: ${MINERU_BASE_IMAGE:-docker.m.daocloud.io/continuumio/miniconda3:25.1.1-2}
        BUILD_HTTP_PROXY: ${MINERU_BUILD_HTTP_PROXY:-}
        BUILD_HTTPS_PROXY: ${MINERU_BUILD_HTTPS_PROXY:-}
        BUILD_NO_PROXY: ${MINERU_BUILD_NO_PROXY:-127.0.0.1,localhost,::1,host.docker.internal}
        PIP_INDEX_URL: ${MINERU_PIP_INDEX_URL:-}
        PIP_EXTRA_INDEX_URL: ${MINERU_PIP_EXTRA_INDEX_URL:-}
        PIP_TRUSTED_HOST: ${MINERU_PIP_TRUSTED_HOST:-}
    image: local/mineru-api:3.0.9
    container_name: mineru-api
    restart: unless-stopped
    dns:
      - ${MINERU_DNS_1:-223.5.5.5}
      - ${MINERU_DNS_2:-119.29.29.29}
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      NO_PROXY: 127.0.0.1,localhost,::1,host.docker.internal
      no_proxy: 127.0.0.1,localhost,::1,host.docker.internal
      HTTP_PROXY: ${MINERU_RUNTIME_HTTP_PROXY:-}
      HTTPS_PROXY: ${MINERU_RUNTIME_HTTPS_PROXY:-}
      http_proxy: ${MINERU_RUNTIME_HTTP_PROXY:-}
      https_proxy: ${MINERU_RUNTIME_HTTPS_PROXY:-}
      HF_HOME: /models/huggingface
      HF_ENDPOINT: ${MINERU_HF_ENDPOINT:-https://hf-mirror.com}
      HF_HUB_DISABLE_XET: ${MINERU_HF_HUB_DISABLE_XET:-1}
      HUGGINGFACE_HUB_CACHE: /models/huggingface/hub
      TRANSFORMERS_CACHE: /models/huggingface
      MODELSCOPE_CACHE: /models/modelscope
      XDG_CACHE_HOME: /models/xdg-cache
    volumes:
      - type: bind
        source: ${HOST_HF_CACHE:-${HOME}/.cache/huggingface}
        target: /models/huggingface
      - type: bind
        source: ${HOST_MODELSCOPE_CACHE:-${HOME}/.cache/modelscope}
        target: /models/modelscope
      - type: volume
        source: mineru-xdg-cache
        target: /models/xdg-cache
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

volumes:
  mineru-xdg-cache:
